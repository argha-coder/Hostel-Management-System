<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Neumorphic background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F1F5F9"/>
      <stop offset="100%" style="stop-color:#CBD5E1"/>
    </linearGradient>

    <!-- Blue stroke gradient -->
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>

    <!-- Outer drop shadow filter -->
    <filter id="outerShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#94A3B8" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="-4" stdDeviation="8" flood-color="#FFFFFF" flood-opacity="0.9"/>
    </filter>

    <!-- Inner shadow filter for neumorphism -->
    <filter id="innerShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feOffset dx="4" dy="4"/>
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in2="SourceGraphic" operator="arithmetic" k2="-1" k3="1" result="shadow"/>
      <feFlood flood-color="#94A3B8" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="shadow" operator="in"/>
    </filter>

    <!-- Stroke glow -->
    <filter id="strokeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="roundedClip">
      <rect x="16" y="16" width="480" height="480" rx="110" ry="110"/>
    </clipPath>
  </defs>

  <!-- Outer drop shadow layer -->
  <rect x="16" y="16" width="480" height="480" rx="110" ry="110" fill="url(#bgGrad)" filter="url(#outerShadow)"/>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="110" ry="110" fill="url(#bgGrad)"/>

  <!-- Highlight top-left (neumorphism light) -->
  <rect x="16" y="16" width="480" height="480" rx="110" ry="110"
    fill="none" stroke="white" stroke-width="2" opacity="0.8"/>

  <!-- THE THREE PARALLEL U STROKES -->
  <!-- Each stroke is a U path: starts top-left, curves down, comes up top-right -->
  <!-- Stroke widths and paths are perfectly parallel, evenly spaced -->

  <!-- Outer U stroke -->
  <path
    d="M 148 148 L 148 300 Q 148 390 256 390 Q 364 390 364 300 L 364 148"
    fill="none"
    stroke="url(#strokeGrad)"
    stroke-width="34"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#strokeGlow)"
  />

  <!-- Inner U stroke (inset ~50px, proper U shape) -->
  <path
    d="M 198 148 L 198 308 Q 198 340 256 340 Q 314 340 314 308 L 314 148"
    fill="none"
    stroke="url(#strokeGrad)"
    stroke-width="34"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#strokeGlow)"
  />


</svg>
